<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Panel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    padding:20px;
    background: linear-gradient(-45deg,#ffffff,#eef3ff,#fef6ff,#eafff5);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    max-width:650px;
    margin:auto;
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(18px);
    border-radius:20px;
    padding:clamp(12px, 3vw, 30px);
    box-shadow:0 15px 40px rgba(0,0,0,.1);
}

.main-title{
    text-align:center;
    font-size:clamp(18px, 4vw, 32px);
    font-weight:700;
    margin-bottom:20px;
    color:#111;
}

/* Panel title */
.panel-title{
    text-align:center;
    font-size:clamp(14px, 3.5vw, 22px);
    font-weight:700;
    color:#4f46e5;
    margin:15px 0;
}

/* BUTTON FIX - SINGLE LINE ONLY */
.copy-btn{
    width:100%;
    border:none;
    padding:clamp(10px, 3vw, 16px);
    margin:6px 0;

    border-radius:12px;
    cursor:pointer;

    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    color:white;
    font-weight:600;

    font-size:clamp(10px, 3.5vw, 16px);

    white-space:nowrap;       /* এক লাইনে থাকবে */
    overflow:hidden;          /* বাইরে যাবে না */
    text-overflow:ellipsis;   /* বেশি বড় হলে ... দেখাবে */

    transition:.3s;
}

.copy-btn:hover{
    transform:translateY(-2px);
}

/* small text */
.copy-text{
    text-align:center;
    font-size:clamp(10px, 2.8vw, 14px);
    color:#666;
}

/* divider */
hr{
    border:none;
    height:1px;
    margin:20px 0;
    background:linear-gradient(to right,transparent,#ccc,transparent);
}

/* toast */
.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#10b981;
    color:white;
    padding:10px 20px;
    border-radius:10px;
    opacity:0;
    transition:.3s;
    font-weight:600;
}

.toast.show{
    opacity:1;
}
</style>
</head>

<body>

<div class="container">

    <div class="main-title">Premium Panel</div>

    <div class="panel-title">P2P SMS Panel</div>
    <button class="copy-btn" onclick="copyText('Trendingacademylimited@gmail.com')">
        Trendingacademylimited@gmail.com
    </button>
    <div class="copy-text">Copy Email</div>

    <hr>

    <div class="panel-title">V3 Smart Nexus</div>

    <button class="copy-btn" onclick="copyText('Trendingacademylimited@gmail.com')">
        Trendingacademylimited@gmail.com
    </button>

    <button class="copy-btn" onclick="copyText('Tamim198')">
        Tamim198
    </button>

    <div class="copy-text">Click to Copy</div>

    <hr>

    <div class="panel-title">Cloud Panel</div>

    <button class="copy-btn" onclick="copyText('clubt431@gmail.com')">
        clubt431@gmail.com
    </button>

    <button class="copy-btn" onclick="copyText('11AA@@@@')">
        11AA@@@@
    </button>

</div>

<div id="toast" class="toast">Copied</div>

<script>
function copyText(text){
    navigator.clipboard.writeText(text);

    const toast = document.getElementById("toast");
    toast.innerText = "Copied: " + text;
    toast.classList.add("show");

    setTimeout(()=>{
        toast.classList.remove("show");
    },2000);
}
</script>

</body>
</html>
